<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management System</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background-color: #f4f4f4;
        color: #333;
      }

      header {
        background-color: #0d47a1;
        color: white;
        padding: 20px 40px;
        text-align: center;
      }

      header h1 {
        margin-bottom: 10px;
      }

      nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 30px;
      }

      nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }

      nav a:hover {
        text-decoration: underline;
        color: #ffcc00;
      }

      .hero {
        background: url("https://images.unsplash.com/photo-1588072432836-e10032774350?auto=format&fit=crop&w=1350&q=80")
          no-repeat center center/cover;
        height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
      }

      .hero-content {
        background-color: rgba(0, 0, 0, 0.6);
        padding: 40px;
        border-radius: 10px;
      }

      .hero-content h2 {
        font-size: 2.5rem;
        margin-bottom: 20px;
      }

      .hero-content p {
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .btn {
        padding: 12px 24px;
        background-color: #ffcc00;
        color: black;
        text-decoration: none;
        font-weight: bold;
        border-radius: 5px;
        transition: 0.3s;
      }

      .btn:hover {
        background-color: #ffaa00;
      }

      footer {
        background-color: #0d47a1;
        color: white;
        text-align: center;
        padding: 15px;
      }

      /* Add this to existing CSS */

      .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 40px;
      }

      .login-btn {
        background-color: #ffcc00;
        color: black;
        padding: 8px 16px;
        border-radius: 5px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }

      .login-btn:hover {
        background-color: #ffaa00;
        color: white;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-container">
        <h1>Student Management System</h1>
        <a href="{% url 'login' %}" class="login-btn">Login</a>
      </div>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Add Student</a></li>
          <li><a href="#">View Students</a></li>
          <li><a href="#">Reports</a></li>
          <li><a href="#">Logout</a></li>
        </ul>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-content">
        <h2>Welcome to the Student Management Portal</h2>
        <p>Manage student data efficiently with ease and security.</p>
        <a href="#" class="btn">Get Started</a>
      </div>
    </section>

    <footer>
      <p>&copy; 2025 Student Management System. All rights reserved.</p>
    </footer>
  </body>
</html>

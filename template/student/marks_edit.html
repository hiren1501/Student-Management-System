<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Marks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }
        
        body {
            background-color: #f4f4f4;
        }
        
        header {
            background-color: #0d47a1;
            color: white;
            padding: 20px 40px;
        }
        
        header h1 {
            margin-bottom: 10px;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        
        nav a:hover {
            color: #ffcc00;
        }
        
        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }
        
        h2 {
            color: #0d47a1;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #0d47a1;
            box-shadow: 0 0 5px rgba(13, 71, 161, 0.3);
        }
        
        .readonly {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }
        
        .btn {
            padding: 10px 20px;
            background-color: #0d47a1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        
        .btn:hover {
            background-color: #ffcc00;
            color: #0d47a1;
        }
        
        .btn-cancel {
            background-color: #999;
            margin-left: 10px;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-cancel:hover {
            background-color: #777;
        }
        
        .message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        footer {
            background-color: #0d47a1;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Edit Student Marks</h1>
        <nav>
            <ul>
                <li><a href="{% url 'faculty_welcome' %}">Dashboard</a></li>
                <li><a href="{% url 'marks_list' %}">View Marks</a></li>
                <li><a href="{% url 'login' %}">Logout</a></li>
            </ul>
        </nav>
    </header>
    
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <h2>Edit Marks</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Student:</label>
                <input type="text" value="{{ mark.student.name }}" class="readonly" readonly>
            </div>
            
            <div class="form-group">
                <label>Roll Number:</label>
                <input type="text" value="{{ mark.student.roll_number }}" class="readonly" readonly>
            </div>
            
            <div class="form-group">
                <label>Subject:</label>
                <input type="text" value="{{ mark.subject }}" class="readonly" readonly>
            </div>
            
            <div class="form-group">
                <label for="exam_type">Exam Type:</label>
                <select id="exam_type" name="exam_type" required>
                    {% for value, label in exam_types %}
                        <option value="{{ value }}" {% if mark.exam_type == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="marks_obtained">Marks Obtained:</label>
                <input type="number" id="marks_obtained" name="marks_obtained" step="0.01" value="{{ mark.marks_obtained }}" required>
            </div>
            
            <div class="form-group">
                <label for="total_marks">Total Marks:</label>
                <input type="number" id="total_marks" name="total_marks" step="0.01" value="{{ mark.total_marks }}" required>
            </div>
            
            <button type="submit" class="btn">Update Marks</button>
            <a href="{% url 'marks_list' %}" class="btn btn-cancel">Cancel</a>
        </form>
    </div>
    
    <footer>
        <p>&copy; 2025 Student Management System. All rights reserved.</p>
    </footer>
</body>
</html>

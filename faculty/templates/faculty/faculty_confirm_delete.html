
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Faculty</title>
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        h1 {
            color: #3b82f6;
            text-align: center;
            margin-top: 40px;
            font-size: 2.2rem;
            letter-spacing: 1px;
        }
        form {
            background: #fff;
            max-width: 400px;
            margin: 40px auto;
            padding: 32px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(59, 130, 246, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        p {
            font-size: 1.1rem;
            color: #374151;
            margin-bottom: 24px;
            text-align: center;
        }
        input[type="submit"] {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.08);
        }
        input[type="submit"]:hover {
            background: #dc2626;
        }
        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
        .cancel-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Delete Faculty</h1>
    <form method="post">
        {% csrf_token %}
        <p>Are you sure you want to delete {{ faculty.name }}?</p>
        <input type="submit" value="Confirm Delete">
    </form>
    <a class="cancel-link" href="{% url 'faculty_list' %}">Cancel</a>
    <a class="action" href="{% url 'admin' %}">Back to Dashboard</a>
</body>
</html>
